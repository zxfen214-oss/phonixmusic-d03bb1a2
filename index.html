<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACCESS DENIED</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .notice-box {
            max-width: 650px;
            padding: 40px;
            border: 2px solid #ff3b30;
            background-color: #1a1a1a;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(255, 59, 48, 0.1);
            margin: 20px;
        }
        .warning-icon {
            color: #ff3b30;
            font-size: 3rem;
            margin-bottom: 15px;
            font-weight: bold;
        }
        h1 {
            color: #ff3b30;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #e5e5ea;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>

    <div class="notice-box">
        <div class="warning-icon">✕</div>
